name: CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Name of the environment to deploy"
        options:
        - pr
        - dev
        - pre-prod
        - prod
  
env:
  AWS_REGION : "ca-central-1"

permissions:
      id-token: write
      contents: read
      actions: write

jobs:
  Code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          output_format: cli
  Deploy:
    needs: Code-check
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEVOPS_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true
          audience: sts.amazonaws.com
      
      - name: Terraform-Setup
        id: Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true      
        
      - name: Terraform-Init
        id: Init
        run: terraform init
          -backend-config="key=${{ inputs.environment }}/patch-policy/terraform.tfstate"
      
      - name: Terraform-Apply
        id: Apply
        run: terraform apply -var="ACCOUNT=${{ secrets.ACCOUNT }}" -var="ENV=${{ inputs.environment }}" -var="EXTERNAL_ID=${{ secrets.EXTERNAL_ID }}" -var="PATCHGROUP_COUNT=${{ vars.PATCHGROUP_COUNT }}" -var="ROLE_ARN=${{ secrets.ROLE_ARN }}" -auto-approve
